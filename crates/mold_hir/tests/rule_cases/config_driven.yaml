# Config-driven rules: CV04 prefer, CV11 prefer, CV09 blocked words.

# CV04 default prefers count(*).
- name: cv04_default_flags_count_one
  rule: CV04
  fail: "SELECT count(1) FROM t"
  fix: "SELECT count(*) FROM t"

# CV04 prefer=1 flags count(*), rewrites to count(1).
- name: cv04_prefer_one_flags_star
  rule: CV04
  options: { CV04: { prefer: "1" } }
  fail: "SELECT count(*) FROM t"
  fix: "SELECT count(1) FROM t"

- name: cv04_prefer_one_accepts_one
  rule: CV04
  options: { CV04: { prefer: "1" } }
  pass: "SELECT count(1) FROM t"

# CV11 default (consistent): single cast can't be inconsistent.
- name: cv11_single_cast_consistent_ok
  rule: CV11
  pass: "SELECT a::int FROM t"

# CV11 prefer=functional flags every :: cast.
- name: cv11_prefer_functional_flags_shorthand
  rule: CV11
  options: { CV11: { prefer: "functional" } }
  fail: "SELECT a::int FROM t"

- name: cv11_prefer_shorthand_accepts_shorthand
  rule: CV11
  options: { CV11: { prefer: "shorthand" } }
  pass: "SELECT a::int FROM t"

# CV09 only fires when a blocked list is configured.
- name: cv09_no_config_silent
  rule: CV09
  pass: "SELECT secret FROM t"

- name: cv09_blocked_word_flagged
  rule: CV09
  options: { CV09: { blocked: "secret,password" } }
  fail: "SELECT secret FROM t"

- name: cv09_unblocked_word_ok
  rule: CV09
  options: { CV09: { blocked: "secret,password" } }
  pass: "SELECT name FROM t"

# CP01 default = upper; policy=lower flips it.
- name: cp01_default_upper_ok
  rule: CP01
  pass: "SELECT id FROM t"

- name: cp01_policy_lower_flags_and_fixes
  rule: CP01
  options: { CP01: { policy: "lower" } }
  fail: "SELECT id FROM t"
  fix: "select id from t"

# CP02 default = lower; policy=upper flips it.
- name: cp02_default_lower_flags_and_fixes
  rule: CP02
  fail: "SELECT FOO FROM t"
  fix: "SELECT foo FROM t"

- name: cp02_policy_upper_flags_and_fixes
  rule: CP02
  options: { CP02: { policy: "upper" } }
  fail: "SELECT foo FROM bar"
  fix: "SELECT FOO FROM BAR"
