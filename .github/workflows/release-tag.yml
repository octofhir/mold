name: Release (tagged)

# Pushing a `vX.Y.Z` tag cuts a stable, versioned GitHub release: a binary per
# platform, each with a `.sha256`, published under that tag and marked latest.
# The rolling `latest` pre-release (release.yml) is unaffected.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Builds (cross-compiling where needed), archives as banshee-<target>.<ext>,
      # writes a matching .sha256, and uploads both to the release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: banshee
          target: ${{ matrix.target }}
          features: db
          archive: banshee-$target
          checksum: sha256
          include: README.md,LICENSE
          token: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Independent of the binary build; needs the CARGO_REGISTRY_TOKEN repo secret.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -u
          crates="banshee_syntax banshee_templater banshee_lexer banshee_parser \
                  banshee_hir banshee_format banshee_completion banshee_config \
                  banshee_schema banshee_lsp banshee"
          for c in $crates; do
            echo "::group::publish $c"
            out=$(cargo publish -p "$c" --no-verify 2>&1) || true
            echo "$out"
            echo "::endgroup::"
            if echo "$out" | grep -qE 'Published|already exists|already uploaded'; then
              echo "ok: $c"
            else
              echo "::error::failed to publish $c"; exit 1
            fi
          done
