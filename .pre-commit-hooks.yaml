# pre-commit hooks provided by banshee.
# Consumers reference this repo in their .pre-commit-config.yaml, e.g.:
#
#   repos:
#     - repo: https://github.com/octofhir/banshee
#       rev: <tag-or-sha>
#       hooks:
#         - id: banshee-format
#         - id: banshee-lint
#
# Both hooks expect a `banshee` binary on PATH.

- id: banshee-format
  name: banshee format (check)
  description: Fail if any SQL file is not formatted.
  entry: banshee format --check
  language: system
  types: [sql]

- id: banshee-lint
  name: banshee lint
  description: Lint staged SQL files.
  entry: banshee lint
  language: system
  types: [sql]
