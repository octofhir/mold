# Example mold configuration.
#
# Used by `just demo-db`. Copy to `mold.toml` and adjust for your project; the
# nearest `mold.toml` is discovered automatically by the CLI and LSP.

[format]
# Base preset: "sqlstyle" (river alignment), "pgformatter", or "compact".
# Every knob below is optional and overrides the preset's value.
style = "sqlstyle"

# keyword-case      = "upper"     # upper | lower | preserve
# identifier-case   = "preserve"  # lower | preserve
# indent-unit       = "space"     # space | tab
# indent-width      = 4           # spaces per level (ignored for tabs)
# max-width         = 100         # wrap width
# comma-style       = "trailing"  # trailing | leading
# river-alignment       = true    # right-align leading keywords (the "river")
# newline-before-logical = true   # break before AND/OR in WHERE
# spaces-around-operators = true
# parentheses-spacing     = false
# align-select-items      = true

[lint]
enabled = true
# exclude = ["AM04"]

# [lint.rules.CP01]
# severity = "warning"

# Per-rule options:
# [lint.rules.CV04]
# prefer = "star"          # star | 1 | 0  — count(*) vs count(1)/count(0)
# [lint.rules.CV11]
# prefer = "consistent"    # consistent | shorthand | functional — cast style
# [lint.rules.CV09]
# blocked = ["old_status", "sysdate"]   # forbid these words (off until set)

[database]
# Connection string is read from this environment variable (preferred over an
# inline `url` so credentials stay out of the file).
url-env = "DATABASE_URL"
schema = "public"
